<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Prediction Churn - Retail ML</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 32px 16px; color: #222; }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 860px;
            margin: 0 auto 24px;
            padding: 28px 32px;
        }

        h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: #666; margin-bottom: 24px; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px 20px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #444;
        }

        input, select {
            padding: 9px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
            transition: border-color .2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #007bff;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
        }

        button:active { transform: scale(0.98); }
        button:hover { opacity: .88; }

        .btn-random { background: #28a745; color: #fff; }
        .btn-predict { background: #007bff; color: #fff; }

        .results-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 860px;
            margin: 0 auto;
            padding: 28px 32px;
            display: none;
        }

        .results-card.visible { display: block; }
        .results-title { font-size: 16px; font-weight: 600; margin-bottom: 18px; color: #333; }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        .metric-box {
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .metric-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: 6px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 700;
        }

        .metric-sub {
            font-size: 12px;
            margin-top: 4px;
        }

        .risk-faible { background: #e8f5e9; }
        .risk-faible .metric-label { color: #2e7d32; }
        .risk-faible .metric-value { color: #1b5e20; }

        .risk-moyen { background: #fff8e1; }
        .risk-moyen .metric-label { color: #f57f17; }
        .risk-moyen .metric-value { color: #e65100; }

        .risk-eleve { background: #fff3e0; }
        .risk-eleve .metric-label { color: #e65100; }
        .risk-eleve .metric-value { color: #bf360c; }

        .risk-critique { background: #fce4ec; }
        .risk-critique .metric-label { color: #c62828; }
        .risk-critique .metric-value { color: #b71c1c; }

        .cluster-box { background: #e3f2fd; }
        .cluster-box .metric-label { color: #1565c0; }
        .cluster-box .metric-value { font-size: 16px; color: #0d47a1; }

        .reg-box { background: #f3e5f5; }
        .reg-box .metric-label { color: #6a1b9a; }
        .reg-box .metric-value { color: #4a148c; }

        .proba-section { margin-top: 4px; }
        .proba-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
        }

        .proba-bar-bg {
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .proba-bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width .5s ease;
        }

        .error-box {
            background: #fdeaea;
            border-left: 4px solid #e53935;
            border-radius: 6px;
            padding: 14px 16px;
            color: #b71c1c;
            font-size: 14px;
            max-width: 860px;
            margin: 16px auto;
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Prediction Churn Client</h1>
    <p class="subtitle">Classification · Clustering · Regression — Retail E-commerce</p>

    <div class="grid">
        <div class="field">
            <label for="CustomerID">Customer ID</label>
            <input id="CustomerID" type="number" value="15484">
        </div>

        <div class="field">
            <label for="Gender">Genre</label>
            <select id="Gender">
                <option value="F">Femme</option>
                <option value="M">Homme</option>
            </select>
        </div>


        <div class="field">
            <label for="Frequency">Frequency (commandes)</label>
            <input id="Frequency" type="number" value="5">
        </div>

        <div class="field">
            <label for="MonetaryTotal">Monetary Total (£)</label>
            <input id="MonetaryTotal" type="number" step="any" value="450.5">
        </div>

        <div class="field">
            <label for="MonetaryAvg">Monetary Avg (£)</label>
            <input id="MonetaryAvg" type="number" step="any" value="90">
        </div>

        <div class="field">
            <label for="TotalQuantity">Total Quantity</label>
            <input id="TotalQuantity" type="number" value="20">
        </div>

        <div class="field">
            <label for="AvgDaysBetweenPurchases">Avg Days Between Purchases</label>
            <input id="AvgDaysBetweenPurchases" type="number" step="any" value="18">
        </div>

        <div class="field">
            <label for="UniqueProducts">Unique Products</label>
            <input id="UniqueProducts" type="number" value="10">
        </div>

        <div class="field">
            <label for="TotalTransactions">Total Transactions</label>
            <input id="TotalTransactions" type="number" value="7">
        </div>

        <div class="field">
            <label for="SupportTicketsCount">Support Tickets</label>
            <input id="SupportTicketsCount" type="number" value="1">
        </div>

        <div class="field">
            <label for="SatisfactionScore">Satisfaction Score (1-5)</label>
            <input id="SatisfactionScore" type="number" step="any" value="4">
        </div>

        <div class="field">
            <label for="Age">Age</label>
            <input id="Age" type="number" step="any" value="35">
        </div>

        <div class="field">
            <label for="FavoriteSeason">Saison preferee</label>
            <select id="FavoriteSeason">
                <option value="Hiver">Hiver</option>
                <option value="Printemps" selected>Printemps</option>
                <option value="Été">Ete</option>
                <option value="Automne">Automne</option>
            </select>
        </div>

        <div class="field">
            <label for="AccountStatus">Statut du compte</label>
            <select id="AccountStatus">
                <option value="Active" selected>Active</option>
                <option value="Suspended">Suspended</option>
                <option value="Pending">Pending</option>
                <option value="Closed">Closed</option>
            </select>
        </div>
    </div>

    </div>

    <!-- Champs cachés : envoyés dans le payload mais non affichés dans le formulaire -->
    <!-- CORRECTION ERREUR : Country, Region, RegistrationDate, RFMSegment, CustomerType, -->
    <!-- WeekendPreference, ProductDiversity sont nécessaires pour transform_for_inference -->
    <!-- Sans eux : RegYear/RegMonth/Country_encoded = 0 → biais silencieux              -->
    <input type="hidden" id="Country"           value="United Kingdom">
    <input type="hidden" id="Region"            value="UK">
    <input type="hidden" id="RegistrationDate"  value="">
    <input type="hidden" id="RFMSegment"        value="Potentiels">
    <input type="hidden" id="CustomerType"      value="Regulier">
    <input type="hidden" id="WeekendPreference" value="Semaine">
    <input type="hidden" id="ProductDiversity"  value="Modere">

    <div class="btn-row">
        <button class="btn-random" onclick="loadRandomClient()">Client aleatoire</button>
        <button class="btn-predict" id="predictBtn" onclick="predictChurn()">Predire</button>
    </div>
</div>

<div class="results-card" id="resultsCard">
    <div class="results-title">Resultats de la prediction</div>

    <div class="metrics-grid">
        <div class="metric-box" id="churnBox">
            <div class="metric-label" id="riskLabel">Risque Churn</div>
            <div class="metric-value" id="churnPred">--</div>
            <div class="metric-sub" id="churnSub"></div>
        </div>

        <div class="metric-box cluster-box">
            <div class="metric-label">Segment client</div>
            <div class="metric-value" id="clusterLabel">--</div>
            <div class="metric-sub" id="clusterSub"></div>
        </div>

        <div class="metric-box reg-box">
            <div class="metric-label">Depense prevue</div>
            <div class="metric-value" id="monetaryPred">--</div>
            <div class="metric-sub">MonetaryTotal estime</div>
        </div>
    </div>

    <div class="proba-section">
        <div class="proba-label">
            <span>Probabilite de churn</span>
            <span id="probaText">--</span>
        </div>
        <div class="proba-bar-bg">
            <div class="proba-bar-fill" id="probaBar" style="width:0%; background:#e53935;"></div>
        </div>
    </div>
</div>

<div class="error-box" id="errorBox"></div>

<script>
function num(id) {
    const v = document.getElementById(id).value.trim();
    if (v === "") return null;
    const n = Number(v);
    return isNaN(n) ? null : n;
}

function showError(msg) {
    document.getElementById("resultsCard").classList.remove("visible");
    const box = document.getElementById("errorBox");
    box.style.display = "block";
    box.textContent = msg;
}

function hideError() {
    document.getElementById("errorBox").style.display = "none";
}

function probaColor(p) {
    if (p < 0.20) return "#43a047";
    if (p < 0.40) return "#fb8c00";
    if (p < 0.70) return "#f4511e";
    return "#e53935";
}

function metricRiskClass(level, pred) {
    if (pred === 1) return "risk-critique";
    if (level === "Faible") return "risk-faible";
    if (level === "Moyen") return "risk-moyen";
    if (level === "Élevé" || level === "Eleve") return "risk-eleve";
    if (level === "Critique") return "risk-critique";
    return "risk-faible";
}

function displayResults(p) {
    hideError();

    const churnBox = document.getElementById("churnBox");
    const pred = parseInt(p.churn_pred);

    churnBox.className = "metric-box " + metricRiskClass(p.risk_level, pred);

    document.getElementById("riskLabel").textContent =
        pred === 1 ? "CHURN DETECTE" : "CLIENT FIDELE";

    document.getElementById("churnPred").textContent =
        pred === 1 ? "1" : "0";

    document.getElementById("churnSub").textContent =
        "Risque " + p.risk_level + " (" + Math.round(parseFloat(p.churn_proba) * 100) + "%)";

    document.getElementById("clusterLabel").textContent = p.cluster_label;
    document.getElementById("clusterSub").textContent = "Cluster " + p.cluster;

    const monetary = parseFloat(p.monetary_pred);
    document.getElementById("monetaryPred").textContent = "£" + monetary.toFixed(2);

    const pct = Math.round(parseFloat(p.churn_proba) * 100);
    document.getElementById("probaText").textContent = pct + "%";
    document.getElementById("probaBar").style.width = pct + "%";
    document.getElementById("probaBar").style.background = probaColor(parseFloat(p.churn_proba));

    document.getElementById("resultsCard").classList.add("visible");
}

function setPredictLoading(isLoading) {
    const btn = document.getElementById("predictBtn");
    if (!btn) return;

    if (isLoading) {
        btn.disabled = true;
        btn.textContent = "Chargement...";
        btn.style.opacity = "0.7";
    } else {
        btn.disabled = false;
        btn.textContent = "Predire";
        btn.style.opacity = "1";
    }
}

function loadRandomClient() {
    fetch("/random_client")
        .then(res => res.json())
        .then(result => {
            if (!result.success) {
                showError("Erreur : " + result.error);
                return;
            }

            const c = result.client;

            document.getElementById("CustomerID").value = c.CustomerID ?? "";
            document.getElementById("Frequency").value = c.Frequency ?? "";
            document.getElementById("MonetaryTotal").value = c.MonetaryTotal ?? "";
            document.getElementById("MonetaryAvg").value = c.MonetaryAvg ?? "";
            document.getElementById("TotalQuantity").value = c.TotalQuantity ?? "";
            document.getElementById("AvgDaysBetweenPurchases").value = c.AvgDaysBetweenPurchases ?? "";
            document.getElementById("UniqueProducts").value = c.UniqueProducts ?? "";
            document.getElementById("TotalTransactions").value = c.TotalTransactions ?? "";
            document.getElementById("SupportTicketsCount").value = c.SupportTicketsCount ?? "";
            document.getElementById("SatisfactionScore").value = c.SatisfactionScore ?? "";
            document.getElementById("Age").value = c.Age ?? "";
            document.getElementById("Gender").value = c.Gender || "F";
            document.getElementById("FavoriteSeason").value = c.FavoriteSeason || "Printemps";
            document.getElementById("AccountStatus").value = c.AccountStatus || "Active";

            // CORRECTION WARN : remplir les champs cachés depuis random_client
            // Évite que Country_encoded / RegYear / RegMonth soient à 0 lors de la prédiction
            document.getElementById("Country").value           = c.Country           || "United Kingdom";
            document.getElementById("Region").value            = c.Region            || "UK";
            document.getElementById("RegistrationDate").value  = c.RegistrationDate  || "";
            document.getElementById("RFMSegment").value        = c.RFMSegment        || "Potentiels";
            document.getElementById("CustomerType").value      = c.CustomerType      || "Regulier";
            document.getElementById("WeekendPreference").value = c.WeekendPreference || "Semaine";
            document.getElementById("ProductDiversity").value  = c.ProductDiversity  || "Modere";

            hideError();
            document.getElementById("resultsCard").classList.remove("visible");
        })
        .catch(() => {
            showError("Impossible de charger un client aleatoire.");
        });
}

function predictChurn() {
    setPredictLoading(true);
    hideError();

    const data = {
        CustomerID: num("CustomerID"),
        Frequency: num("Frequency"),
        MonetaryTotal: num("MonetaryTotal"),
        MonetaryAvg: num("MonetaryAvg"),
        TotalQuantity: num("TotalQuantity"),
        AvgDaysBetweenPurchases: num("AvgDaysBetweenPurchases"),
        UniqueProducts: num("UniqueProducts"),
        TotalTransactions: num("TotalTransactions"),
        SupportTicketsCount: num("SupportTicketsCount"),
        SatisfactionScore: num("SatisfactionScore"),
        Age: num("Age"),
        Gender: document.getElementById("Gender").value || "F",
        FavoriteSeason: document.getElementById("FavoriteSeason").value,
        AccountStatus: document.getElementById("AccountStatus").value,
        // CORRECTION ERREUR : champs cachés inclus dans le payload
        // Évite que transform_for_inference reçoive NaN pour ces colonnes importantes
        Country:           document.getElementById("Country").value           || "United Kingdom",
        Region:            document.getElementById("Region").value            || "UK",
        RegistrationDate:  document.getElementById("RegistrationDate").value  || null,
        RFMSegment:        document.getElementById("RFMSegment").value        || "Potentiels",
        CustomerType:      document.getElementById("CustomerType").value      || "Regulier",
        WeekendPreference: document.getElementById("WeekendPreference").value || "Semaine",
        ProductDiversity:  document.getElementById("ProductDiversity").value  || "Modere"
    };

    fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(result => {
        if (result.success && result.predictions && result.predictions.length > 0) {
            displayResults(result.predictions[0]);
        } else {
            showError("Erreur : " + (result.error || "Réponse invalide"));
        }
    })
    .catch(() => {
        showError("Impossible de contacter l'API Flask.");
    })
    .finally(() => {
        setPredictLoading(false);
    });
}
</script>

</body>
</html>
